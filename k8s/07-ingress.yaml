apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voting-app-ingress
  namespace: voting-app
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Vote app
          - path: /vote(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: vote
                port:
                  number: 80

          # Vote static files
          - path: /()(static/.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: vote
                port:
                  number: 80

          # IMPORTANT: Result Socket.IO path must stay /result/socket.io
          - path: /()(result/socket.io.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: result
                port:
                  number: 80

          # Result app main route
          - path: /result(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: result
                port:
                  number: 80

          # Result frontend assets
          - path: /()(angular.min.js|app.js|socket.io.js|stylesheets/.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: result
                port:
                  number: 80
