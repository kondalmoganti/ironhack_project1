name: EKS CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: kmoganti
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: spot-eks-lab-kondal
  IMAGE_TAG: eks-v1

jobs:
  build-and-deploy:
    name: Build, Push and Deploy to EKS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push vote image
        uses: docker/build-push-action@v6
        with:
          context: ./vote
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/vote:${{ env.IMAGE_TAG }}

      - name: Build and push result image
        uses: docker/build-push-action@v6
        with:
          context: ./result
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/result:${{ env.IMAGE_TAG }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/worker:${{ env.IMAGE_TAG }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $EKS_CLUSTER_NAME \
            --region $AWS_REGION

      - name: Deploy Kubernetes manifests
        run: |
          kubectl apply -f k8s/
          kubectl get pods -n voting-app
          kubectl get svc -n voting-app
          kubectl get ingress -n voting-app
